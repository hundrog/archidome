<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netlify Forms Gateway</title>
</head>
<body>
    <form name="feedback-archidome" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input type="hidden" name="form-name" value="feedback-archidome" />
        <input name="bot-field" />
        <input type="text" name="name" />
        <select name="type">
            <option>Bug Report</option>
            <option>Feature Request</option>
            <option>Other</option>
        </select>
        <textarea name="message"></textarea>
    </form>
</body>
</html>
